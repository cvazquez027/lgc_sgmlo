<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGML - Lamas Global Consulting</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Tenor+Sans&display=swap" rel="stylesheet">

    <style>
        /* Variables de tu marca */
        :root {
            --clr-primary: #007FA1; /* Turquesa LGC */
            --clr-accent: #90A224;  /* Verde Oliva LGC */
            --clr-tostado: #E0D6C4; /* Crema LGC */
            --font-heading: 'Tenor Sans', sans-serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: #ffffff; /* Fondo blanco solicitado */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #334155;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            text-align: center;
        }

        .logo {
            max-width: 200px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: var(--font-heading);
            color: var(--clr-primary);
            font-size: 24px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--clr-primary);
        }

        /* El botón con el estilo que pediste (Blanco con hover Azul/Turquesa) */
        .btn-login {
            width: 100%;
            background-color: white;
            color: var(--clr-primary);
            border: 2px solid var(--clr-primary);
            padding: 14px;
            border-radius: 8px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--clr-primary);
            color: white;
        }

        /* Mensaje de Error */
        #error-msg {
            margin-top: 20px;
            padding: 12px;
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: none; /* Oculto por defecto */
        }

        .loader {
            display: none;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo_lgc.png" alt="Lamas Global Consulting" class="logo">
        
        <h1>Acceso a Usuarios Registrados</h1>
        <p class="subtitle">Sistema de Gestión de Matriz Legal</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="usuario@lamasglobal.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                <span class="loader">⌛</span> Iniciar Sesión
            </button>
        </form>

        <div id="error-msg">Credenciales incorrectas.</div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue
            
            // Ocultamos error previo
            errorMsg.style.display = 'none';
            
            // Simulamos una carga de 1 segundo
            submitBtn.innerText = 'Validando...';
            submitBtn.disabled = true;

            setTimeout(() => {
                // Restauramos botón
                submitBtn.innerText = 'Iniciar Sesión';
                submitBtn.disabled = false;
                
                // Siempre mostramos credenciales incorrectas como pediste
                errorMsg.style.display = 'block';
                
                // Limpiamos los campos para simular el fallo
                document.getElementById('password').value = '';
            }, 1000);
        });
    </script>

</body>
</html>
